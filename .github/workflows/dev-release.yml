name: Dev Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - dev

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect release-relevant changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            release:
              - 'cmd/**'
              - 'internal/**'
              - 'docker/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - '.dockerignore'

      - name: Stop if no release changes
        if: steps.changes.outputs.release != 'true'
        run: |
          echo "No release-relevant changes detected"
          exit 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build Go binaries
        run: just build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push edge-trust image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            senthora/edge-trust:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cfmock image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/cfmock/Dockerfile
          push: true
          tags: |
            senthora/cfmock:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
