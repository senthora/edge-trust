name: CI

on:
  push:
    branches: [ master, dev ]
    paths:
      - '.github/workflows/**'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'just/**'
      - 'Justfile'
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      IPV4_CIDRS: 103.21.244.0/22,173.245.48.0/20,198.41.128.0/17
      IPV6_CIDRS: 2400:cb00::/32,2606:4700::/32,2803:f800::/32
      ETAG: 7f4c2d91e6ab3f0c58d2a4b9f1e7c635
      HASH: sha256:4e25067cfc8579af9fd81c407bae411d1c6db84de3dd14f32647a3a560d4ea27

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Go binaries
        run: just build

      - name: Run unit tests
        run: just test

      - name: Build edge-trust image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          tags: senthora/edge-trust:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build cfmock image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/cfmock/Dockerfile
          tags: senthora/cfmock:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build integration test image
        run: docker compose build itest

      - name: Start cfmock service
        run: docker compose up -d cfmock --wait

      - name: Run edge-trust
        run: docker compose run --rm --no-deps edge-trust --debug run

      - name: Run integration tests
        run: docker compose run --rm itest

      - name: Print compose logs
        if: always()
        run: just compose-logs --tail=500 --no-color || true

      - name: Shutdown compose stack
        if: always()
        run: docker compose down -v --remove-orphans
