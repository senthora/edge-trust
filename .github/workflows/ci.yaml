name: CI

on:
  push:
    branches: [ master, dev ]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docker/**'
      - 'just/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'go.mod'
      - 'go.sum'
      - 'Justfile'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build edge-trust
        run: just build edge-trust

      - name: Run unit tests
        run: just test

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: test

    env:
      IPV4_CIDRS: 103.21.244.0/22,173.245.48.0/20,198.41.128.0/17
      IPV6_CIDRS: 2400:cb00::/32,2606:4700::/32,2803:f800::/32
      ETAG: 7f4c2d91e6ab3f0c58d2a4b9f1e7c635
      HASH: sha256:4e25067cfc8579af9fd81c407bae411d1c6db84de3dd14f32647a3a560d4ea27

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Pull busybox image
        run: docker pull busybox:1.37.0

      - name: Build go project
        run: just build

      - name: Build compose stack
        run: docker compose build

      - name: Start cfmock service
        run: docker compose up -d cfmock --wait

      - name: Run edge-trust
        run: docker compose run --rm --no-deps edge-trust --debug run

      - name: Run integration tests
        run: docker compose run --rm itest

      - name: Print compose logs
        if: always()
        run: just compose-logs --tail=500 --no-color || true

      - name: Shutdown compose stack
        if: always()
        run: docker compose down -v --remove-orphans
