name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'just/**'
      - 'Justfile'
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - '!**/*.md'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      IPV4_CIDRS: 103.21.244.0/22,173.245.48.0/20,198.41.128.0/17
      IPV6_CIDRS: 2400:cb00::/32,2606:4700::/32,2803:f800::/32
      ETAG: 7f4c2d91e6ab3f0c58d2a4b9f1e7c635
      HASH: sha256:4e25067cfc8579af9fd81c407bae411d1c6db84de3dd14f32647a3a560d4ea27

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build Go binaries
        run: just build

      - name: Detect Go code changes
        id: go-changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'

      - name: Resolve test execution
        id: test-check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || \
                "${{ steps.go-changes.outputs.go }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        if: steps.test-check.outputs.run == 'true'
        run: just test

      - name: Build docker images
        run: docker compose build

      - name: Start cfmock service
        run: docker compose up -d cfmock --wait

      - name: Run edge-trust
        run: docker compose run --rm --no-deps edge-trust --debug run

      - name: Run integration tests
        run: docker compose run --rm itest

      - name: Print compose logs
        if: always()
        run: just compose-logs --tail=500 --no-color || true

      - name: Shutdown compose stack
        if: always()
        run: docker compose down -v --remove-orphans

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            release:
              - 'cmd/**'
              - 'internal/**'
              - 'docker/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - '.dockerignore'

      - name: Set up Go
        if: steps.changes.outputs.release == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install just
        if: steps.changes.outputs.release == 'true'
        uses: extractions/setup-just@v4

      - name: Build Go binaries
        if: steps.changes.outputs.release == 'true'
        run: just build

      - name: Set up Docker Buildx
        if: steps.changes.outputs.release == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.changes.outputs.release == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push edge-trust image
        if: steps.changes.outputs.release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: senthora/edge-trust:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cfmock image
        if: steps.changes.outputs.release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/cfmock/Dockerfile
          push: true
          tags: senthora/cfmock:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
